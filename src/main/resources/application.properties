# ── Server ────────────────────────────────────────────────────
server.port=8080
# Generic error page — no stack traces exposed to users
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# ── H2 Database ───────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:librarydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console (dev only — disable in production)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Thymeleaf ─────────────────────────────────────────────────
spring.thymeleaf.cache=false

# ── Logging ───────────────────────────────────────────────────
logging.level.com.ssdlc.library=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n
