<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Books — SecureLibrary</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a class="brand" th:href="@{/books}">📚 SecureLibrary</a>
    <div class="nav-links">
        <a th:href="@{/books}">Books</a>
        <sec:authorize access="isAuthenticated()">
            <a th:href="@{/books/my-requests}">My Requests</a>
        </sec:authorize>
        <sec:authorize access="hasRole('LIBRARIAN')">
            <a th:href="@{/admin}">Admin Panel</a>
        </sec:authorize>
        <sec:authorize access="isAnonymous()">
            <a th:href="@{/auth/login}">Login</a>
            <a th:href="@{/auth/register}" class="btn-primary">Register</a>
        </sec:authorize>
        <sec:authorize access="isAuthenticated()">
            <span class="user-info">👤 <sec:authentication property="name"/></span>
            <form th:action="@{/auth/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </sec:authorize>
    </div>
</nav>
<main class="container">
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${param.success}" class="alert alert-success">Borrow request submitted successfully!</div>

    <div class="page-header">
        <h1>📚 Book Catalogue</h1>
        <form th:action="@{/books/search}" method="get" class="search-form">
            <input type="text" name="keyword" placeholder="Search by title or category..."
                   th:value="${search}" maxlength="100"/>
            <button type="submit" class="btn-primary">Search</button>
            <a th:href="@{/books}" class="btn-secondary">Clear</a>
        </form>
    </div>

    <div th:if="${books.empty}" class="empty-state">
        <p>No books found.</p>
    </div>

    <div class="books-grid">
        <div class="book-card" th:each="book : ${books}">
            <div class="book-header">
                <span class="book-category" th:text="${book.category}">Category</span>
                <span class="book-copies"
                      th:classappend="${book.availableCopies == 0} ? 'out-of-stock' : 'in-stock'"
                      th:text="${book.availableCopies > 0} ? ${book.availableCopies} + ' available' : 'Unavailable'">
                </span>
            </div>
            <h3 th:text="${book.title}">Title</h3>
            <p class="book-author" th:text="'by ' + ${book.author}">Author</p>
            <p class="book-desc" th:text="${book.description}">Description</p>

            <sec:authorize access="isAuthenticated() and hasRole('USER')">
                <form th:if="${book.availableCopies > 0}"
                      th:action="@{/books/{id}/borrow(id=${book.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn-primary btn-full">Request Borrow</button>
                </form>
                <button th:if="${book.availableCopies == 0}"
                        class="btn-disabled btn-full" disabled>Unavailable</button>
            </sec:authorize>
            <sec:authorize access="isAnonymous()">
                <a th:href="@{/auth/login}" class="btn-secondary btn-full">Login to Borrow</a>
            </sec:authorize>
        </div>
    </div>
</main>
<footer class="footer"><p>SecureLibrary &copy; 2026</p></footer>
</body>
</html>
