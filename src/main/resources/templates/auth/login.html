<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Login — SecureLibrary</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a class="brand" th:href="@{/books}">📚 SecureLibrary</a>
    <div class="nav-links">
        <a th:href="@{/auth/login}">Login</a>
        <a th:href="@{/auth/register}" class="btn-primary">Register</a>
    </div>
</nav>
<main class="container">
    <div class="auth-card">
        <h2>Login</h2>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${param.registered}" class="alert alert-success">
            Registration successful! Please log in.
        </div>

        <form th:action="@{/auth/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                       required autocomplete="username" maxlength="50"/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       required autocomplete="current-password" maxlength="100"/>
            </div>
            <button type="submit" class="btn-primary btn-full">Login</button>
        </form>

        <p class="auth-link">No account? <a th:href="@{/auth/register}">Register here</a></p>

        <div class="demo-accounts">
            <p><strong>Demo accounts:</strong></p>
            <p>User: <code>hussnain</code> / <code>User@1234</code></p>
            <p>Admin: <code>admin</code> / <code>Admin@1234</code></p>
        </div>
    </div>
</main>
</body>
</html>
