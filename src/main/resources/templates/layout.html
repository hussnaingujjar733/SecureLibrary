<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} ?: 'Secure Library'">Secure Library</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a class="brand" th:href="@{/books}">📚 SecureLibrary</a>
    <div class="nav-links">
        <a th:href="@{/books}">Books</a>
        <sec:authorize access="isAuthenticated()">
            <a th:href="@{/books/my-requests}">My Requests</a>
        </sec:authorize>
        <sec:authorize access="hasRole('LIBRARIAN')">
            <a th:href="@{/admin}">Admin Panel</a>
        </sec:authorize>
        <sec:authorize access="isAnonymous()">
            <a th:href="@{/auth/login}">Login</a>
            <a th:href="@{/auth/register}" class="btn-primary">Register</a>
        </sec:authorize>
        <sec:authorize access="isAuthenticated()">
            <span class="user-info">
                👤 <sec:authentication property="name"/>
                <sec:authorize access="hasRole('LIBRARIAN')"> (Librarian)</sec:authorize>
            </span>
            <form th:action="@{/auth/logout}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Logout</button>
            </form>
        </sec:authorize>
    </div>
</nav>

<main class="container">
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <th:block th:fragment="content"></th:block>
</main>

<footer class="footer">
    <p>SecureLibrary &copy; 2026 — SSDLC Final Project</p>
</footer>
</body>
</html>
