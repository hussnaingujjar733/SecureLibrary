<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>My Requests — SecureLibrary</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a class="brand" th:href="@{/books}">📚 SecureLibrary</a>
    <div class="nav-links">
        <a th:href="@{/books}">Books</a>
        <a th:href="@{/books/my-requests}">My Requests</a>
        <span class="user-info">👤 <sec:authentication property="name"/></span>
        <form th:action="@{/auth/logout}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-logout">Logout</button>
        </form>
    </div>
</nav>
<main class="container">
    <h1>My Borrow Requests</h1>

    <div th:if="${requests.empty}" class="empty-state">
        <p>You have no borrow requests yet.</p>
        <a th:href="@{/books}" class="btn-primary">Browse Books</a>
    </div>

    <table th:if="${!requests.empty}" class="data-table">
        <thead>
            <tr>
                <th>Book Title</th>
                <th>Author</th>
                <th>Requested At</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="req : ${requests}">
                <td th:text="${req.book.title}">Title</td>
                <td th:text="${req.book.author}">Author</td>
                <td th:text="${#temporals.format(req.requestedAt, 'dd/MM/yyyy HH:mm')}">Date</td>
                <td>
                    <span th:text="${req.status}"
                          th:classappend="${req.status.name() == 'APPROVED'} ? 'badge-green' :
                                          (${req.status.name() == 'REJECTED'} ? 'badge-red' : 'badge-yellow')"
                          class="badge">Status</span>
                </td>
            </tr>
        </tbody>
    </table>
</main>
<footer class="footer"><p>SecureLibrary &copy; 2026</p></footer>
</body>
</html>
