<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Book Form — SecureLibrary</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a class="brand" th:href="@{/books}">📚 SecureLibrary</a>
    <div class="nav-links">
        <a th:href="@{/admin}">← Back to Admin</a>
    </div>
</nav>
<main class="container">
    <div class="auth-card">
        <h2 th:text="${book.id != null} ? 'Edit Book' : 'Add New Book'">Book Form</h2>

        <form th:action="@{/admin/books/save}" method="post" th:object="${book}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" th:field="*{id}"/>

            <div class="form-group">
                <label>Title</label>
                <input type="text" th:field="*{title}" required maxlength="200"/>
            </div>
            <div class="form-group">
                <label>Author</label>
                <input type="text" th:field="*{author}" required maxlength="100"/>
            </div>
            <div class="form-group">
                <label>Category</label>
                <input type="text" th:field="*{category}" required maxlength="50"/>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" rows="3" maxlength="1000"></textarea>
            </div>
            <div class="form-group">
                <label>Available Copies</label>
                <input type="number" th:field="*{availableCopies}" min="0" max="999" required/>
            </div>

            <button type="submit" class="btn-primary btn-full">Save Book</button>
        </form>
    </div>
</main>
</body>
</html>
